name: Template Repository Initialization

on:
  # Triggers the workflow on creation of repository
  create:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write

jobs:
  initialize_repository:
    if: github.repository != 'FAIRmat-NFDI/nomad-distro-template' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      # Removes template-only content and updates the README with the new repository details
      - name: Update README
        run: |
          export repository="${{ github.repository }}"
          export repository_owner="${{ github.repository_owner }}"
          export repository_name="${{ github.event.repository.name }}"
          export image_name="$(printf '%s' "${repository}" | tr '[:upper:]' '[:lower:]')"

          sed -i '/<!-- TEMPLATE-ONLY:START -->/,/<!-- TEMPLATE-ONLY:END -->/d' README.md
          sed -i "s|https://github.com/FAIRmat-NFDI/nomad-distro-template/actions/workflows/docker-publish.yml/badge.svg|https://github.com/${repository}/actions/workflows/docker-publish.yml/badge.svg|g" README.md
          sed -i "s|^# FAIRmat-NFDI's NOMAD Oasis Distribution$|# ${repository_owner}'s NOMAD Oasis Distribution|g" README.md
          sed -i "s|^This is the NOMAD Oasis distribution of FAIRmat-NFDI\\.$|This is the NOMAD Oasis distribution of ${repository_owner}.|g" README.md
          sed -i "s|^    git clone https://github.com/FAIRmat-NFDI/nomad-distro-template\\.git$|    git clone https://github.com/${repository}.git|g" README.md
          sed -i "s|^    cd nomad-distro-template$|    cd ${repository_name}|g" README.md
          sed -i "s|^    curl-L -o nomad-distro-template\\.zip \"https://github.com/FAIRmat-NFDI/nomad-distro-template/archive/main\\.zip\"$|    curl-L -o ${repository_name}.zip \"https://github.com/${repository}/archive/main.zip\"|g" README.md
          sed -i "s|^    unzip nomad-distro-template\\.zip$|    unzip ${repository_name}.zip|g" README.md
          sed -i "s|ghcr.io/fairmat-nfdi/nomad-distro-template:main|ghcr.io/${image_name}:main|g" README.md
          sed -i "s|ghcr.io/fairmat-nfdi/nomad-distro-template/jupyter:main|ghcr.io/${image_name}/jupyter:main|g" README.md
          sed -i "s|https://ghcr.io/v2/FAIRmat-NFDI/nomad-distro-template/manifests/main|https://ghcr.io/v2/${repository}/manifests/main|g" README.md

      # Replaces the template repository name in the docker config file with the new one
      - name: Update docker-compose.yaml
        run: |
          export image_name="${{ github.repository }}"
          sed -i "s|fairmat-nfdi/nomad-distro-template|${image_name,,}|g" docker-compose.yaml

        # Replaces the template repository name in the nomad config with the new one
      - name: Update nomad.yaml
        run: |
          export image_name="${{ github.repository }}"
          sed -i "s|fairmat-nfdi/nomad-north-jupyter:latest|${image_name,,}/jupyter:main|g" configs/nomad.yaml

        # Replaces the template repository name in the pyproject.toml with the new one
      - name: Update pyproject.toml
        run: |
          export image_name="${{ github.repository }}"
          sed -i "s|FAIRmat-NFDI/nomad-distro-template|${image_name,,}|g" pyproject.toml

      # Deletes this workflow file to prevent it from running on branch creation
      - name: Delete initialization workflow
        run: rm .github/workflows/initialize.yml

      # Commits all changes
      - name: Commit repository initialization
        run: |
          git config --global user.name github-actions
          git config --global user.email github-actions@github.com
          git commit -am "Repository initialization"
          git push
